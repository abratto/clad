# CLAD project-wide settings
#
# Edit this file to configure your project. It works with any agent
# framework (Cline, Copilot, Cursor, Roo, Codex, …).

# --- Canonical test command ---
# The single shell command that runs all tests for this profile.
# Used by the quality gate and by CLAD green-work agents after each edit.
# Examples:
#   mvn test
#   ./gradlew test
#   npm test
test.command=mvn test -f app/backend/pom.xml

# --- Use case stage configuration ---
# Whether to require Mermaid sequence diagrams in Stage 01 use cases.
# Set to false if your LLM struggles with diagram generation.
# When true, every Fully Dressed scenario must include a sequenceDiagram.
# When false, diagrams are optional.
stages.usecase.require-sequence-diagram=true

# --- Storage layer ---
# A human-readable description of your persistence technology.
# Used by the Stage 04a storage-mapping context to tell the agent what
# storage primitives it should model.
# Examples:
#   Jena TDB2 named graph (Java/Micronaut profile)
#   PostgreSQL schema per concept (Spring Boot profile)
#   MongoDB collection per concept (Node.js profile)
storage.layer=Jena TDB2 named graph (Java/Micronaut profile)

# --- JSON serialization ---
# CLAD syncs author field-value maps where missing fields imply null.
# Set your framework's JSON serializer to always include null values
# rather than omitting them. The Conduit spec asserts e.g.
#   jsonpath "$.user.bio" == null
# which fails with 'none' when nulls are omitted.
jackson.serialization-inclusion=always
