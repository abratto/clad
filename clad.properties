# CLAD project-wide settings
#
# Edit this file to configure your project. It works with any agent
# framework (Cline, Copilot, Cursor, Roo, Codex, …).

# --- Canonical test command ---
# The single shell command that runs all tests for this profile.
# Used by the quality gate and by CLAD green-work agents after each edit.
# Examples:
#   mvn test
#   ./gradlew test
#   npm test
test.command=mvn test

# --- Storage layer ---
# A human-readable description of your persistence technology.
# Used by the Stage 04a storage-mapping context to tell the agent what
# storage primitives it should model.
# Examples:
#   Jena TDB2 named graph (Java/Micronaut profile)
#   PostgreSQL schema per concept (Spring Boot profile)
#   MongoDB collection per concept (Node.js profile)
storage.layer=Jena TDB2 named graph (Java/Micronaut profile)
