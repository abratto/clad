# CLAD project-wide settings
#
# Edit this file to configure your project. It works with any agent
# framework (Cline, Copilot, Cursor, Roo, Codex, …).
#
# Resolution order (lower number wins):
#   1. clad.properties (repo root)              ← you are here
#   2. features/UC-XX/_config/<key>.md          ← per-feature override
#   3. Stage-level CONTEXT.md                   ← stage-specific override
#
# For example, if you set test.framework=NATIVE here but need Cucumber
# for one specific feature, create that feature's
#   features/UC-XX/_config/test-framework.md
# with the line TEST_FRAMEWORK=CUCUMBER and the agent will use Cucumber
# for that feature while the rest of the project stays on NATIVE.

# --- Test framework ---
# Controls the outer-red flow-test format at Stage 04c.
#   NATIVE   (default) — write markdown flow-test specs + native JUnit tests.
#                        No additional dependencies required.
#   CUCUMBER           — write Gherkin .feature files + step-definition
#                        skeletons. Requires Cucumber dependencies in your
#                        build file (see reference-impl/java-micronaut-jena/pom.xml).
test.framework=NATIVE

# --- Canonical test command ---
# The single shell command that runs all tests for this profile.
# Used by the quality gate and by CLAD green-work agents after each edit.
# Examples:
#   mvn test
#   ./gradlew test
#   npm test
test.command=mvn test

# --- Storage layer ---
# A human-readable description of your persistence technology.
# Used by the Stage 04a storage-mapping context to tell the agent what
# storage primitives it should model.
# Examples:
#   Jena TDB2 named graph (Java/Micronaut profile)
#   PostgreSQL schema per concept (Spring Boot profile)
#   MongoDB collection per concept (Node.js profile)
storage.layer=Jena TDB2 named graph (Java/Micronaut profile)
