# CLAD project-wide settings
# ============================
# This file is parsed by the agent at workspace load.
# Per-feature overrides go in features/UC-XX/_config/<key>.md,
# where <key> is the part before the first dot (e.g. "test.framework" → _config/test-framework.md).
#
# Resolution order:
#   1. clad.properties (repo root, global default)
#   2. features/UC-XX/_config/<key>.md   (per-feature, if present)
#   3. Stage-level CONTEXT.md            (stage-specific, if explicitly documented)

# Test framework: CUCUMBER or NATIVE
#   CUCUMBER — profile supports Cucumber/Gherkin (.feature files + step-definitions)
#   NATIVE   — no Cucumber support, or opted out (markdown flow-test specs + native test stubs)
test.framework=NATIVE

# Canonical test command
#   The single command that runs the test suite for this profile.
test.command=mvn test

# Storage layer
#   The persistence technology used by this profile.
#   Examples: "Jena TDB2 named graph (Java/Micronaut profile)",
#             "PostgreSQL schema per concept",
#             "MongoDB collection per concept"
storage.layer=Jena TDB2 named graph (Java/Micronaut profile)
